name: Model Conversion Workflow

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      model_url:
        description: '模型下载URL (支持任意Git仓库/HuggingFace/压缩包URL)'
        required: true
        default: 'tencent/HY-MT1.5-1.8B'
      export_format:
        description: '导出格式 (例如: mnn)'
        required: true
        default: 'mnn'
      quant_bit:
        description: '量化位数'
        required: true
        default: '4'
      lm_quant_bit:
        description: 'LM Head 层量化位数 (可选)'
        required: false
        default: ''
      quant_block:
        description: '量化块大小'
        required: true
        default: '64'
      quant_algorithm:
        description: '量化算法 (awq/hqq/smooth/无)'
        required: false
        default: false
        type: choice
        options:
          - ''
          - 'awq'
          - 'hqq'
          - 'smooth'
      symmetric_quant:
        description: '启用对称量化 (--sym)'
        required: false
        default: 'false'
        type: boolean

jobs:
  convert_model:
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup system tools
      run: |
        sudo apt-get update
        sudo apt-get install -y wget unzip git tree git-lfs
        git lfs install

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Extract model info
      id: model_info
      env:
        MODEL_URL: ${{ github.event.inputs.model_url }}
      run: |
        set -eo pipefail
        
        if [[ -z "$MODEL_URL" ]]; then
          echo "Error: Empty model URL"
          exit 1
        fi
        
        # 处理HuggingFace模型ID或URL
        if [[ $MODEL_URL != http* ]]; then
          # 如果直接是模型ID (如 tencent/HY-MT1.5-1.8B)
          MODEL_NAME=$(echo "$MODEL_URL" | sed 's/\/$//')
          echo "Source type: HuggingFace Model ID"
        elif [[ $MODEL_URL == *"huggingface.co"* ]]; then
          MODEL_NAME=$(echo "$MODEL_URL" | sed -n 's|.*huggingface\.co/\([^/]\{1,\}/[^/]\{1,\}\).*|\1|p')
          [ -z "$MODEL_NAME" ] && MODEL_NAME=$(echo "$MODEL_URL" | awk -F/ '{print $(NF-1)"/"$NF}')
          echo "Source type: HuggingFace URL"
        elif [[ $MODEL_URL == *.git ]] || [[ $MODEL_URL == *"/tree/"* ]] || [[ $MODEL_URL == *"/blob/"* ]]; then
          MODEL_NAME=$(echo "$MODEL_URL" | awk -F/ '{print $(NF-1)"/"$NF}' | sed 's/\.git$//')
          echo "Source type: Git Repository"
        elif [[ $MODEL_URL == *.zip ]] || [[ $MODEL_URL == *.tar.gz ]] || [[ $MODEL_URL == *.tgz ]]; then
          MODEL_NAME=$(basename "$MODEL_URL" | sed 's/\.[^.]*$//')
          echo "Source type: Archive"
        else
          echo "Warning: Unrecognized URL format, attempting to treat as git repository"
          MODEL_NAME=$(basename "$MODEL_URL" | sed 's/\.git$//')
          echo "Source type: Unknown (treating as git)"
        fi
        
        # 清理模型名称，移除特殊字符
        MODEL_NAME=$(echo "$MODEL_NAME" | sed 's/[\/]/_/g')
        
        echo "Extracted model name: ${MODEL_NAME}"
        echo "MODEL_NAME=${MODEL_NAME}" >> $GITHUB_ENV
        echo "REPO_ID=${MODEL_NAME}" >> $GITHUB_ENV
        echo "model_name=${MODEL_NAME}" >> $GITHUB_OUTPUT

    - name: Configure swap space
      run: |
        sudo swapoff /swapfile || true
        sudo rm -f /swapfile
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile
        free -h
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 添加了 datasets, sentencepiece, protobuf 和 scipy 等常见依赖
        pip install torch transformers accelerate tqdm datasets sentencepiece protobuf scipy
        pip install "mnn>=2.0.0"
        pip install llmexport

    - name: Download model
      env:
        HF_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        MODEL_URL: ${{ github.event.inputs.model_url }}
      run: |
        set -x
        mkdir -p ${{ github.workspace }}/models
        cd ${{ github.workspace }}/models
        
        download_status=0
        
        # 确保 git lfs 被初始化
        git lfs install
        
        # 检查是否是HuggingFace模型ID
        if [[ $MODEL_URL != http* ]]; then
          echo "Cloning from HuggingFace by model ID using Git LFS: $MODEL_URL"
          if [ -n "$HF_TOKEN" ]; then
            git clone --depth 1 "https://oauth2:${HF_TOKEN}@huggingface.co/$MODEL_URL" ./${{ env.MODEL_NAME }} || download_status=$?
          else
            git clone --depth 1 "https://huggingface.co/$MODEL_URL" ./${{ env.MODEL_NAME }} || download_status=$?
          fi
        elif [[ $MODEL_URL == *"huggingface.co"* ]]; then
          echo "Cloning from HuggingFace URL using Git LFS..."
          REPO_URL="$MODEL_URL"
          # 如果带有 Token 且原链接未包含账号信息，则注入 Token
          if [ -n "$HF_TOKEN" ] && [[ "$REPO_URL" != *"@"* ]]; then
            REPO_PATH=$(echo "$REPO_URL" | sed -n 's|.*huggingface\.co/\(.*\)|\1|p')
            REPO_URL="https://oauth2:${HF_TOKEN}@huggingface.co/${REPO_PATH}"
          fi
          git clone --depth 1 "$REPO_URL" ./${{ env.MODEL_NAME }} || download_status=$?
        elif [[ $MODEL_URL == *.zip ]]; then
          echo "Downloading zip archive..."
          wget -q "$MODEL_URL" -O model.zip && \
          mkdir -p ./${{ env.MODEL_NAME }} && \
          unzip -q model.zip -d ./${{ env.MODEL_NAME }} || download_status=$?
        elif [[ $MODEL_URL == *.tar.gz ]] || [[ $MODEL_URL == *.tgz ]]; then
          echo "Downloading tar archive..."
          wget -q "$MODEL_URL" -O model.tar.gz && \
          mkdir -p ./${{ env.MODEL_NAME }} && \
          tar xzf model.tar.gz -C ./${{ env.MODEL_NAME }} || download_status=$?
        else
          echo "Attempting to clone repository using Git LFS..."
          git clone --depth 1 "$MODEL_URL" ./${{ env.MODEL_NAME }} || download_status=$?
        fi
        
        if [ $download_status -ne 0 ]; then
          echo "Error: Failed to download model"
          exit 1
        fi
        
        if [ ! -d "./${{ env.MODEL_NAME }}" ]; then
          echo "Error: Model directory not found after download"
          ls -la
          exit 1
        fi
        
        echo "Download completed. Model directory contents:"
        ls -la ./${{ env.MODEL_NAME }}

    - name: Convert model
      run: |
        set -x
        cd ${{ github.workspace }}/models
        
        MODEL_PATH="./${{ env.MODEL_NAME }}"
        if [ ! -d "$MODEL_PATH" ]; then
          echo "Error: Model directory not found: $MODEL_PATH"
          ls -la
          exit 1
        fi
        
        # 构建转换命令
        CONVERT_CMD="llmexport --path $MODEL_PATH \
                     --export ${{ github.event.inputs.export_format }} \
                     --quant_bit ${{ github.event.inputs.quant_bit }} \
                     --quant_block ${{ github.event.inputs.quant_block }}"
        
        # 添加语言模型量化位数参数（如果设置了）
        if [ -n "${{ github.event.inputs.lm_quant_bit }}" ]; then
          CONVERT_CMD="$CONVERT_CMD --lm_quant_bit ${{ github.event.inputs.lm_quant_bit }}"
        fi
        
        # 添加量化算法选项
        if [ -n "${{ github.event.inputs.quant_algorithm }}" ]; then
          CONVERT_CMD="$CONVERT_CMD --${{ github.event.inputs.quant_algorithm }}"
        fi
        
        # 添加对称量化选项
        if [ "${{ github.event.inputs.symmetric_quant }}" == "true" ]; then
          CONVERT_CMD="$CONVERT_CMD --sym"
        fi
        
        # 添加输出路径
        CONVERT_CMD="$CONVERT_CMD --dst_path ./converted"
        
        echo "Running conversion command:"
        echo "$CONVERT_CMD"
        
        # 执行转换
        eval $CONVERT_CMD

        if [ ! -d "./converted" ]; then
          echo "Error: Conversion failed - output directory not created"
          exit 1
        fi
        
        echo "Conversion completed. Output directory contents:"
        ls -la ./converted/

    - name: Archive converted model
      run: |
        cd ${{ github.workspace }}/models
        
        # 创建临时目录用于打包
        mkdir -p ./package_temp
        
        # 复制转换后的文件
        if [ -d "./converted" ]; then
          cp -r ./converted/* ./package_temp/ 2>/dev/null || true
        fi
        
        # 如果package_temp为空，报错
        if [ -z "$(ls -A ./package_temp)" ]; then
          echo "Error: No files to archive"
          exit 1
        fi
        
        # 创建压缩包
        cd ./package_temp
        echo "Creating archive with files:"
        ls -la
        
        # 使用绝对路径创建压缩包
        zip -r "${{ github.workspace }}/models/${{ env.MODEL_NAME }}.zip" ./*
        
        cd "${{ github.workspace }}/models"
        
        if [ ! -f "./${{ env.MODEL_NAME }}.zip" ]; then
          echo "Error: Failed to create archive"
          pwd
          ls -la
          exit 1
        fi
        
        # 清理临时目录
        rm -rf ./package_temp
        
        echo "Archive created successfully:"
        ls -la "./${{ env.MODEL_NAME }}.zip"

    - name: List files in archive
      id: list_files
      run: |
        cd ${{ github.workspace }}/models
        if [ -f "./${{ env.MODEL_NAME }}.zip" ]; then
          FILE_LIST=$(unzip -l "./${{ env.MODEL_NAME }}.zip")
          echo "file_list<<EOF" >> $GITHUB_ENV
          echo "$FILE_LIST" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
        else
          echo "file_list=Archive file not found" >> $GITHUB_ENV
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: converted-${{ env.MODEL_NAME }}
        path: ${{ github.workspace }}/models/${{ env.MODEL_NAME }}.zip
        retention-days: 7
        if-no-files-found: error

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: "release-${{ env.MODEL_NAME }}-${{ github.run_number }}"
        name: "${{ env.MODEL_NAME }} ${{ github.event.inputs.export_format }} Model"
        body: |
          Conversion Details:
          - Source: ${{ github.event.inputs.model_url }}
          - Format: ${{ github.event.inputs.export_format }}
          - Quantization: ${{ github.event.inputs.quant_bit }}bit
          - LM Quant Bit: ${{ github.event.inputs.lm_quant_bit || 'Same as quant_bit' }}
          - Block Size: ${{ github.event.inputs.quant_block }}
          - Quant Algorithm: ${{ github.event.inputs.quant_algorithm || 'None' }}
          - Symmetric Quant: ${{ github.event.inputs.symmetric_quant }}
          - Build: ${{ github.run_number }}
          
          Archive Contents:
          ```
          ${{ env.file_list }}
          ```
        files: |
          ${{ github.workspace }}/models/${{ env.MODEL_NAME }}.zip
        draft: false
        prerelease: false

    - name: Cleanup resources
      if: always()
      run: |
        sudo swapoff /swapfile || true
        df -h
        sudo rm -f /swapfile || true
        rm -rf ${{ github.workspace }}/models